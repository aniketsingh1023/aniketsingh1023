<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes blink  { 0%,49%{ opacity:1 } 50%,100%{ opacity:0 } }
    .c0  { opacity:0; animation: fadeIn .12s  .3s forwards; }
    .c1  { opacity:0; animation: fadeIn .12s  .7s forwards; }
    .c2  { opacity:0; animation: fadeIn .12s 1.0s forwards; }
    .c3  { opacity:0; animation: fadeIn .12s 1.3s forwards; }
    .c4  { opacity:0; animation: fadeIn .12s 1.6s forwards; }
    .c5  { opacity:0; animation: fadeIn .12s 1.9s forwards; }
    .c6  { opacity:0; animation: fadeIn .12s 2.2s forwards; }
    .c7  { opacity:0; animation: fadeIn .12s 2.5s forwards; }
    .c8  { opacity:0; animation: fadeIn .12s 2.8s forwards; }
    .c9  { opacity:0; animation: fadeIn .12s 3.1s forwards; }
    .c10 { opacity:0; animation: fadeIn .12s 3.4s forwards; }
    .c11 { opacity:0; animation: fadeIn .12s 3.7s forwards; }
    .c12 { opacity:0; animation: fadeIn .12s 4.0s forwards; }
    .c13 { opacity:0; animation: fadeIn .12s 4.2s forwards; }
    .cur { animation: blink .8s 4.35s infinite; }
    text, tspan { font-family: 'Courier New', Courier, monospace; font-size: 13px; }
  </style>

