    </text>
  </g>

  <!-- Line: 7    impact   : "45,000+ users", -->
  <g class="c6">
    <text x="20" y="220" fill="#858585" text-anchor="middle">7</text>
    <text y="220">
      <tspan x="62" fill="#9cdcfe">  impact   </tspan><tspan fill="#d4d4d4">: </tspan><tspan fill="#ce9178">"45,000+ users"</tspan><tspan fill="#d4d4d4">,</tspan>
    </text>
  </g>

