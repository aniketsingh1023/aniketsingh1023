<svg xmlns="http://www.w3.org/2000/svg" width="800" height="360" viewBox="0 0 800 360">
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes blink  { 0%,49%{ opacity:1 } 50%,100%{ opacity:0 } }
    .l0  { opacity:0; animation: fadeIn .12s  .4s forwards; }
    .l1  { opacity:0; animation: fadeIn .12s  .9s forwards; }
    .l2  { opacity:0; animation: fadeIn .12s 1.3s forwards; }
    .l3  { opacity:0; animation: fadeIn .12s 1.6s forwards; }
    .l4  { opacity:0; animation: fadeIn .12s 1.9s forwards; }
    .l5  { opacity:0; animation: fadeIn .12s 2.2s forwards; }
    .l6  { opacity:0; animation: fadeIn .12s 2.5s forwards; }
    .l7  { opacity:0; animation: fadeIn .12s 2.8s forwards; }
    .l8  { opacity:0; animation: fadeIn .12s 3.1s forwards; }
    .l9  { opacity:0; animation: fadeIn .12s 3.4s forwards; }
    .l10 { opacity:0; animation: fadeIn .12s 3.7s forwards; }
    .lc  { opacity:0; animation: fadeIn .12s 3.7s forwards; }
    .cur { animation: blink .8s 3.85s infinite; }
    text, tspan { font-family: 'Courier New', Courier, monospace; font-size: 13.5px; }
  </style>

  <!-- Window -->
