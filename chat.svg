  <circle cx="44" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="18" r="6" fill="#27c93f"/>
  <text x="400" y="23" text-anchor="middle" fill="#8b949e" font-size="12px">aniket@terminal: ~/about</text>

